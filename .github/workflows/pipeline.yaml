name: Ci_Pipeline

on:
  push:
    branches: ["github-workflows"]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm i

      - name: Run Tests
        run: npm run test

      - name: Build Project
        run: npm run build
