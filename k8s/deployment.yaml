apiVersion: apps/v1
kind: Deployment
metadata:
  name: "kubernetes-api"
  labels:
    app: "kubernetes-api"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: "kubernetes-api"
  template:
    metadata:
      labels:
        app: "kubernetes-api"
    spec:
      containers:
        - name: "kubernetes-api"
          image: "alphabeast97/kubernetes-api:latest"
          ports:
            - containerPort: 3000
          env:
            - name: "NODE_ENV"
              value: "production"
            - name: "POD_NAME"
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: "/readyz"
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: "/healthz"
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
